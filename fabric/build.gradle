plugins {
    id 'multiloader-loader'
    id 'fabric-loom'
}
dependencies {
    minecraft "com.mojang:minecraft:${minecraft_version}"
    mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
    modImplementation "net.fabricmc:fabric-loader:${fabric_loader_version}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${fabric_version}"
}
tasks.register("generateData", JavaExec) {
    group = "fabric"
    mainClass.set("net.thenu.ge.datagen.datagen")
    classpath = sourceSets.main.runtimeClasspath
}
tasks.named("generateData") {
    doFirst {
        // Path where generated data will be placed
        systemProperty("fabric-api.datagen.output-dir", file("$buildDir/generated"))
        // Your mod ID
        systemProperty("fabric-api.datagen.modid", "ge")
    }
}
sourceSets {
    main {
        resources {
            srcDirs += project(':common').file('src/main/generated')
        }
    }
}
fabricApi {
    configureDataGeneration {

    }
}
loom {
    def aw = project(':common').file("src/main/resources/${mod_id}.accesswidener")
    if (aw.exists()) {
        accessWidenerPath.set(aw)
    }
    mixin {
        defaultRefmapName.set("${mod_id}.refmap.json")
    }
    runs {
        client {
            client()
            setConfigName('Fabric Client')
            ideConfigGenerated(true)
            runDir('runs/client')
        }
        server {
            server()
            setConfigName('Fabric Server')
            ideConfigGenerated(true)
            runDir('runs/server')
            property "fabric-api.datagen", "true"
        }
    }
}